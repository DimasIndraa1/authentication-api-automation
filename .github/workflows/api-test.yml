name: API Automation Test

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: write

jobs:
  api-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Install Newman & Reporters
        run: npm install -g newman newman-reporter-htmlextra newman-reporter-allure

      - name: Run Positive Tests
        continue-on-error: true
        run: |
          newman run api-automation/collections/auth/auth.postman_collection.json \
            -e api-automation/environments/dev/dev.postman_environment.json \
            --folder "Positive Flow" \
            -r htmlextra,allure \
            --reporter-htmlextra-export newman/index-positive.html \
            --reporter-htmlextra-darkTheme \
            --reporter-htmlextra-title "API Test Report - Positive"

      - name: Run Negative Tests
        continue-on-error: true
        run: |
          newman run api-automation/collections/auth/auth.postman_collection.json \
            -e api-automation/environments/dev/dev.postman_environment.json \
            --folder "Negative Flow" \
            -d api-automation/data/scenario.json \
            -r htmlextra,allure \
            --reporter-htmlextra-export newman/index-negative.html \
            --reporter-htmlextra-darkTheme \
            --reporter-htmlextra-title "API Test Report - Negative"

      - name: Generate Allure Report
        if: always()
        run: npx allure generate allure-results --output allure-report

      - name: Prepare combined reports
        if: always()
        run: |
          mkdir -p public/allure-report
          cp -r newman/* public/
          cp -r allure-report/* public/allure-report/

      - name: Deploy to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
